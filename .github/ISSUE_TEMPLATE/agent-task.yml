name: Agent Task
about: Create a structured task for agent execution
labels: [needs-triage]

body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Short description of the task

  - type: textarea
    id: classification
    attributes:
      label: 5PP Classification
      description: Clarify, Scope, Plan, Execute, Verify

  - type: dropdown
    id: role
    attributes:
      label: Suggested Role
      options:
        - role:validation
        - role:runtime
        - role:installer
        - role:docs
        - role:release-gate

  - type: textarea
    id: validation
    attributes:
      label: Validation Impact
      description: What validation step is affected

  - type: textarea
    id: notes
    attributes:
      label: Notes
